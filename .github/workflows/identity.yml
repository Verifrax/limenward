name: Identity
on:
  push:
    branches: [ "main" ]
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify README identity (PRIM-006)
        shell: bash
        run: |
          set -euo pipefail
          head -n 1 README.md | tr -d "\r" | grep -Fx "PRIM-006"
