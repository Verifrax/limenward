name: Identity
on:
  push:
    branches: [ "main" ]
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify README identity (```)
        run: |
          set -euo pipefail
          line="$(head -n 1 README.md | tr -d r)"
          echo "line1=$line"
          [ "$line" = "```" ]
