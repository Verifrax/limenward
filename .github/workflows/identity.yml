name: Identity
on:
  push:
    branches: [ "main" ]
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify README identity (PRIM-006)
        run: |
          set -euo pipefail
          python - <<PY
          import sys, pathlib
          p = pathlib.Path("README.md")
          b = p.read_bytes()
          print("bytes0_16:", b[:16])
          line1 = b.splitlines(True)[:1]
          line1 = line1[0].decode("utf-8", "replace") if line1 else ""
          print("line1:", repr(line1))
          assert line1 == "PRIM-006\n", repr(line1)
          PY
